<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>基準 - Meme Stock Scanner</title>
    <script src="/static/theme.js"></script>
    <link rel="stylesheet" href="/static/theme.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg-primary);
            color: var(--text-secondary);
            font-family: 'Segoe UI', 'Meiryo', sans-serif;
        }
        .header {
            background: var(--bg-tertiary);
            border-bottom: 1px solid var(--border);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .header a.back { color: var(--text-link); text-decoration: none; font-size: 14px; }
        .header h1 { font-size: 20px; color: var(--text-primary); }

        .main { max-width: 900px; margin: 24px auto; padding: 0 16px; }

        .section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-bottom: 16px;
        }
        .section h3 {
            padding: 12px 16px;
            background: var(--bg-tertiary);
            border-bottom: 1px solid var(--border);
            font-size: 15px;
            border-radius: 8px 8px 0 0;
        }
        .section-body { padding: 16px; }
        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
        }
        .setting-row:last-child { border-bottom: none; }
        .setting-label { font-size: 13px; color: var(--text-secondary); }
        .setting-value { font-size: 14px; font-weight: bold; color: var(--text-primary); text-align: right; }
        .setting-desc { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

        .score-bar-container {
            display: flex; height: 28px; border-radius: 6px; overflow: hidden; margin: 12px 0;
        }
        .score-bar {
            display: flex; align-items: center; justify-content: center;
            font-size: 11px; font-weight: bold; color: #fff;
        }

        .result-badges { display: flex; gap: 10px; flex-wrap: wrap; margin: 8px 0; }
        .result-badge {
            padding: 8px 16px; border-radius: 8px; text-align: center; min-width: 100px;
        }
        .result-badge .label { font-size: 11px; color: rgba(255,255,255,0.7); }
        .result-badge .value { font-size: 18px; font-weight: bold; margin-top: 2px; }

        .flow { display: flex; flex-direction: column; gap: 4px; margin: 8px 0; }
        .flow-step {
            display: flex; align-items: center; gap: 8px; padding: 6px 12px;
            background: var(--bg-alert, var(--bg-card)); border-radius: 6px; font-size: 13px;
        }
        .flow-arrow { text-align: center; color: var(--text-link); font-size: 16px; }
        .flow-num {
            background: rgba(61,158,255,0.15); color: var(--text-link);
            width: 22px; height: 22px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 11px; font-weight: bold; flex-shrink: 0;
        }

        /* Mobile responsive */
        @media (max-width: 768px) {
            .header { padding: 10px 12px; }
            .header h1 { font-size: 18px; }
            .back { font-size: 14px; padding: 8px; min-width: 44px; min-height: 44px; display: flex; align-items: center; }
            .main { padding: 0 8px; margin: 12px auto; }
            .section { border-radius: 6px; }
            .section h3 { font-size: 14px; }
            .section-body { padding: 10px; }
            .setting-row { flex-wrap: wrap; gap: 6px; }
            .setting-row label { font-size: 13px; }
            .score-bar-container { height: auto; flex-wrap: wrap; }
            .score-bar { font-size: 10px; min-width: 0; padding: 6px 4px; }
            .result-badges { gap: 6px; }
            .result-badge { min-width: 70px; padding: 8px 12px; font-size: 12px; }
            .btn { min-height: 44px; font-size: 14px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="/" class="back">← ダッシュボード</a>
        <h1>アラート基準・スコア配分</h1>
    </div>

    <div class="main" id="content">
        <div style="text-align:center;padding:40px;color:var(--text-muted);">読み込み中...</div>
    </div>

    <script>
        async function load() {
            try {
                const resp = await fetch('/api/settings');
                const s = await resp.json();
                render(s);
            } catch(e) {
                document.getElementById('content').innerHTML =
                    '<div style="text-align:center;padding:40px;color:var(--red);">読み込みエラー</div>';
            }
        }

        function render(s) {
            document.getElementById('content').innerHTML = `

            <div class="section">
                <h3>スキャン処理の流れ</h3>
                <div class="section-body">
                    <div class="flow">
                        <div class="flow-step"><span class="flow-num">1</span> NASDAQ APIから$${s.scanner.max_price}以下の全銘柄を取得</div>
                        <div class="flow-arrow">↓</div>
                        <div class="flow-step"><span class="flow-num">2</span> ${s.scanner.scan_interval_sec/60}分ごとに全銘柄の出来高・価格をチェック</div>
                        <div class="flow-arrow">↓</div>
                        <div class="flow-step"><span class="flow-num">3</span> 異常を検出 → アラート生成 → スコア計算</div>
                        <div class="flow-arrow">↓</div>
                        <div class="flow-step"><span class="flow-num">4</span> フロート分析 + インサイダーチェック（SEC EDGAR）</div>
                        <div class="flow-arrow">↓</div>
                        <div class="flow-step"><span class="flow-num">5</span> 結果追跡（1日後/3日後/7日後の値動きを自動記録）</div>
                        <div class="flow-arrow">↓</div>
                        <div class="flow-step"><span class="flow-num">6</span> データ蓄積 → スコア配点を自動調整</div>
                    </div>
                </div>
            </div>

            <div class="section">
                <h3>アラート検出基準</h3>
                <div class="section-body">
                    <div class="setting-row">
                        <div><div class="setting-label">出来高急増（VOLUME_SPIKE）</div>
                        <div class="setting-desc">20日間の平均出来高と比較</div></div>
                        <div class="setting-value">${s.scanner.volume_spike_mult}倍以上</div>
                    </div>
                    <div class="setting-row">
                        <div><div class="setting-label">出来高じわ上げ（VOLUME_RISING）</div>
                        <div class="setting-desc">各日が前日の${s.scanner.volume_rising_mult}倍以上で連続増加</div></div>
                        <div class="setting-value">${s.scanner.volume_rising_days}日連続</div>
                    </div>
                    <div class="setting-row">
                        <div><div class="setting-label">価格急騰（PRICE_SPIKE）</div>
                        <div class="setting-desc">出来高${s.price_spike.min_volume.toLocaleString()}以上が条件</div></div>
                        <div class="setting-value">+${s.price_spike.pct}%以上</div>
                    </div>
                    <div class="setting-row">
                        <div><div class="setting-label">プレマーケット出来高</div>
                        <div class="setting-desc">ET 10時前の出来高が前日比で異常</div></div>
                        <div class="setting-value">${s.premarket.vol_mult}倍以上</div>
                    </div>
                    <div class="setting-row">
                        <div><div class="setting-label">インサイダー買い</div>
                        <div class="setting-desc">SEC Form 4から役員の自社株買いを検出</div></div>
                        <div class="setting-value">$${s.insider.min_buy_usd.toLocaleString()}以上 / 直近${s.insider.lookback_days}日</div>
                    </div>
                    <div class="setting-row">
                        <div><div class="setting-label">複合シグナル（COMBINED）</div>
                        <div class="setting-desc">出来高異常 + インサイダー買いが同時発生</div></div>
                        <div class="setting-value" style="color:var(--red);">最高優先度</div>
                    </div>
                </div>
            </div>

            <div class="section">
                <h3>フィルター条件</h3>
                <div class="section-body">
                    <div class="setting-row">
                        <div class="setting-label">対象銘柄の株価上限</div>
                        <div class="setting-value">$${s.scanner.max_price}</div>
                    </div>
                    <div class="setting-row">
                        <div class="setting-label">最低平均出来高（過疎銘柄除外）</div>
                        <div class="setting-value">${s.scanner.min_avg_volume.toLocaleString()}</div>
                    </div>
                    <div class="setting-row">
                        <div class="setting-label">銘柄リスト更新頻度</div>
                        <div class="setting-value">${s.scanner.universe_refresh_hours}時間ごと</div>
                    </div>
                </div>
            </div>

            <div class="section">
                <h3>フロート（流通株数）基準</h3>
                <div class="section-body">
                    <div class="setting-row">
                        <div><div class="setting-label">超低フロート（ULTRA_LOW）</div>
                        <div class="setting-desc">少しの買いで大きく動く</div></div>
                        <div class="setting-value" style="color:var(--red);">${(s.float.ultra_low_float/1e6).toFixed(0)}M株以下</div>
                    </div>
                    <div class="setting-row">
                        <div><div class="setting-label">低フロート（LOW）</div>
                        <div class="setting-desc">値動きが大きくなりやすい</div></div>
                        <div class="setting-value" style="color:var(--orange);">${(s.float.low_float_threshold/1e6).toFixed(0)}M株以下</div>
                    </div>
                    <div class="setting-row">
                        <div class="setting-label">通常（NORMAL）</div>
                        <div class="setting-value">それ以上</div>
                    </div>
                </div>
            </div>

            <div class="section">
                <h3>総合スコア配分（100点満点）</h3>
                <div class="section-body">
                    <div class="score-bar-container">
                        <div class="score-bar" style="flex:${s.scoring.volume_max};background:#ea580c;">出来高 ${s.scoring.volume_max}</div>
                        <div class="score-bar" style="flex:${s.scoring.float_max};background:#dc2626;">フロート ${s.scoring.float_max}</div>
                        <div class="score-bar" style="flex:${s.scoring.insider_max};background:#16a34a;">インサイダー ${s.scoring.insider_max}</div>
                        <div class="score-bar" style="flex:${s.scoring.price_max};background:#7c3aed;">価格変動 ${s.scoring.price_max}</div>
                        <div class="score-bar" style="flex:${s.scoring.short_max};background:#2563eb;">空売り ${s.scoring.short_max}</div>
                    </div>
                    <div class="setting-row">
                        <div class="setting-label">出来高異常</div>
                        <div class="setting-value">最大${s.scoring.volume_max}点</div>
                    </div>
                    <div class="setting-row">
                        <div class="setting-label">フロート</div>
                        <div class="setting-value">最大${s.scoring.float_max}点</div>
                    </div>
                    <div class="setting-row">
                        <div class="setting-label">インサイダー買い</div>
                        <div class="setting-value">最大${s.scoring.insider_max}点</div>
                    </div>
                    <div class="setting-row">
                        <div class="setting-label">価格急騰</div>
                        <div class="setting-value">最大${s.scoring.price_max}点</div>
                    </div>
                    <div class="setting-row">
                        <div class="setting-label">複合ボーナス</div>
                        <div class="setting-value">+${s.scoring.combined_bonus}点</div>
                    </div>
                    <div class="setting-row">
                        <div class="setting-label">空売り比率</div>
                        <div class="setting-value">最大${s.scoring.short_max}点</div>
                    </div>
                </div>
            </div>

            <div class="section">
                <h3>結果判定基準（${s.result_tracking.judgment_days}日間追跡）</h3>
                <div class="section-body">
                    <div class="result-badges">
                        <div class="result-badge" style="background:rgba(0,229,160,0.15);">
                            <div class="label">成功</div>
                            <div class="value" style="color:#00e5a0;">+${s.result_tracking.win_pct}%到達</div>
                        </div>
                        <div class="result-badge" style="background:rgba(100,116,139,0.1);">
                            <div class="label">ハズレ</div>
                            <div class="value" style="color:var(--text-muted);">+${s.result_tracking.win_pct}%未到達</div>
                        </div>
                    </div>
                    <div class="setting-desc" style="margin-top:12px;line-height:1.8;">
                        検知した価格から<b>1度でも+${s.result_tracking.win_pct}%以上に到達</b>すれば「成功」。<br>
                        その後に下がっても、到達した時点で利益を得る機会があったと判定。<br>
                        ${s.result_tracking.judgment_days}日間で1度も到達しなければ「ハズレ」。
                    </div>
                </div>
            </div>

            <div class="section">
                <h3>Discord通知フィルター（実績ベース）</h3>
                <div class="section-body">
                    <div class="setting-row">
                        <div><div class="setting-label">$1未満 + 出来高10倍以上</div>
                        <div class="setting-desc">成功率91% - 最も信頼性の高いパターン</div></div>
                        <div class="setting-value" style="color:var(--red);">必ず通知</div>
                    </div>
                    <div class="setting-row">
                        <div><div class="setting-label">$1未満 + 出来高5倍以上</div>
                        <div class="setting-desc">成功率86%</div></div>
                        <div class="setting-value" style="color:var(--red);">必ず通知</div>
                    </div>
                    <div class="setting-row">
                        <div><div class="setting-label">出来高20倍以上</div>
                        <div class="setting-desc">成功率87%</div></div>
                        <div class="setting-value" style="color:var(--red);">必ず通知</div>
                    </div>
                    <div class="setting-row">
                        <div><div class="setting-label">買い集め / ブレイク前兆 / 底打ち反転</div>
                        <div class="setting-desc">成功率60-68%</div></div>
                        <div class="setting-value" style="color:var(--orange);">通知</div>
                    </div>
                    <div class="setting-row">
                        <div><div class="setting-label">スコア25点以上</div>
                        <div class="setting-desc">成功率74%</div></div>
                        <div class="setting-value" style="color:var(--orange);">通知</div>
                    </div>
                    <div class="setting-row">
                        <div><div class="setting-label">PRICE_SPIKE（+20%以上で検知）</div>
                        <div class="setting-desc">成功率44% / 翌日平均-7% → 天井掴みリスク</div></div>
                        <div class="setting-value" style="color:var(--text-muted);">ブロック</div>
                    </div>
                    <div class="setting-row">
                        <div><div class="setting-label">株式併合（リバーススプリット）</div>
                        <div class="setting-desc">見かけ上の価格上昇</div></div>
                        <div class="setting-value" style="color:var(--text-muted);">ブロック</div>
                    </div>
                </div>
            </div>

            <div class="section">
                <h3>スコア自動調整マイルストーン</h3>
                <div class="section-body">
                    <div class="setting-desc" style="margin-bottom:8px;">結果データが以下の件数に到達すると、スコア配点を実績ベースに自動最適化。</div>
                    ${s.auto_adjust.milestones.map((m, i) => `
                        <div class="setting-row">
                            <div class="setting-label">第${i+1}回調整</div>
                            <div class="setting-value">${m}件到達時</div>
                        </div>
                    `).join('')}
                </div>
            </div>
            `;
        }

        load();
    </script>
</body>
</html>
